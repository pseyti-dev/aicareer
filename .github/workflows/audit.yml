name: Weekly Site Audit

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch: # Manual trigger for testing

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # Needed to open GitHub issues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit dependencies
        run: |
          pip install google-api-python-client google-auth 2>/dev/null || true

      - name: Run site audit
        id: audit
        env:
          # GSC integration — optional. Configure a service account Viewer in GCP,
          # then add GSC_SERVICE_ACCOUNT_JSON secret in repo Settings → Secrets.
          # Leave unset to skip GSC checks.
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: 'sc-domain:aicareer.me'
        run: python scripts/audit.py

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-report.md
          retention-days: 30

      - name: Open GitHub issue if problems found
        if: steps.audit.outputs.issue_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');
            const issueCount = '${{ steps.audit.outputs.issue_count }}';

            // Check for existing open audit issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'audit',
              state: 'open',
            });

            const title = `🔍 Weekly site audit: ${issueCount} issue(s) found`;
            const body = report + `\n\n---\n_Generated by [Weekly Site Audit](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · ${new Date().toISOString().split('T')[0]}_`;

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title,
                body,
              });
              console.log(`Updated existing audit issue #${issues[0].number}`);
            } else {
              // Open new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['audit'],
              });
              console.log('Opened new audit issue');
            }

      - name: Close audit issue if all clear
        if: steps.audit.outputs.issue_count == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'audit',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                body: issue.body + '\n\n✅ Auto-closed: all checks passed on ' + new Date().toISOString().split('T')[0],
              });
              console.log(`Closed audit issue #${issue.number}`);
            }
